<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ลูกโป่งหรรษา AR Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
  
  <style>
    :root { --sky-top: #5db8ff; --sky-mid: #a8e0ff; --sky-bot: #d6f3ff; }
    * { box-sizing: border-box; }
    html, body { margin:0; padding:0; font-family:'Mali',cursive; overflow:hidden; background:#bae6fd; color:#fff; touch-action:none; user-select:none; -webkit-user-select:none; }
    .title-font { font-family:'Fredoka',sans-serif; }
    .screen { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:50; }
    .screen.hidden { display:none; }
    
    .hud { position:fixed; top:20px; left:20px; right:20px; z-index:30; display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:16px; pointer-events:none; }
    .hud-pill { background:rgba(255,255,255,0.95); border:4px solid white; border-radius:24px; padding:8px 24px; box-shadow:0 6px 0 rgba(0,0,0,0.2); color:#1e2937; font-weight:700; display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .hud-pill .label { font-size:16px; opacity:0.8; }
    .hud-pill .value { font-size:32px; font-family:'Fredoka',sans-serif; line-height:1; }
    .score-pill { order: 1; }
    .time-pill { order: 3; }
    
    .progress-wrapper { flex: 1 1 200px; display: flex; justify-content: center; order: 2; }
    @media (max-width: 600px) {
      .progress-wrapper { order: 3; width: 100%; flex: 1 1 100%; margin-top: 8px; }
      .time-pill { order: 2; }
    }
    
    .progress-bar { width:100%; max-width:600px; height:24px; background:rgba(255,255,255,0.6); border-radius:9999px; overflow:hidden; border:4px solid white; box-shadow:0 4px 10px rgba(0,0,0,0.2); }
    .progress { height:100%; background:linear-gradient(90deg, #ef4444, #f59e0b, #22c55e); width:100%; transition:width 1s linear; border-radius:9999px; }

    /* ปรับแต่งโจทย์ผลไม้ให้ไม่มีกรอบและขยายใหญ่ขึ้นมาก */
    .center-prompt { 
      position:fixed; 
      top:15%; 
      left:50%; 
      transform:translateX(-50%); 
      z-index:20; 
      max-width:100%; 
      text-align:center; 
      pointer-events: none; /* ป้องกันการบังนิ้ว */
      width: 100%;
    }
    .fruit-display {
      font-size: clamp(40px, 14vw, 120px);
      line-height: 1.1;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4)) drop-shadow(0 4px 6px rgba(0,0,0,0.2));
      display: inline-block;
      white-space: nowrap; /* บังคับให้ผลไม้เรียงเป็นแถวเดียวกัน ไม่ปัดบรรทัดใหม่ */
    }
    
    .start-card, .end-card { background:rgba(255,255,255,0.98); border:8px solid white; border-radius:32px; padding:32px; max-width:460px; width:92%; box-shadow:0 0 0 6px #ff6b6b, 0 25px 50px rgba(0,0,0,0.3); text-align:center; color:#2c3e50; }
    .game-title { font-size:clamp(32px,7vw,48px); animation:titleBounce 2s infinite; }
    @keyframes titleBounce { 0%,100%{transform:scale(1)rotate(-3deg)} 50%{transform:scale(1.08)rotate(3deg)} }
    .btn-cartoon { padding:16px 40px; font-size:24px; font-weight:700; border-radius:9999px; background:linear-gradient(#ff8a8a,#ff4d4d); color:white; box-shadow:0 8px 0 #c53030; transition:all 0.1s; cursor:pointer; }
    .btn-cartoon:active { transform:translateY(6px); box-shadow:0 2px 0 #c53030; }
    
    #video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); opacity:0.85; z-index:1; }
    canvas { position:fixed; inset:0; pointer-events:none; z-index:2; }
  </style>
</head>
<body>
  <div id="start-screen" class="screen">
    <div class="start-card">
      <h1 class="title-font game-title text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-orange-500 to-yellow-400 mb-4">🍎 ลูกโป่งหรรษา<br>นับผลไม้ 🍌</h1>
      <button id="start-btn" class="btn-cartoon w-full">เริ่มเล่นเลย! 🚀</button>
    </div>
  </div>

  <div id="game-screen" class="screen hidden">
    <video id="video" playsinline></video>
    <canvas id="canvas-game"></canvas>
    <canvas id="canvas-hand"></canvas>

    <div class="hud">
      <div class="hud-pill score-pill">
        <span class="label">คะแนน</span>
        <span id="score-val" class="value text-emerald-600">0</span>
      </div>
      
      <div class="progress-wrapper">
        <div class="progress-bar"><div id="progress" class="progress"></div></div>
      </div>
      
      <div class="hud-pill time-pill">
        <span class="label">เวลา</span>
        <span id="time-val" class="value text-rose-600">90</span>
      </div>
    </div>

    <div class="center-prompt">
      <div id="prompt-text"></div>
    </div>

    <div id="status" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-black/70 text-white px-6 py-2 rounded-full text-sm z-30 shadow-lg">⏳ กำลังเปิดกล้อง...</div>
  </div>

  <div id="end-screen" class="screen hidden">
    <div class="end-card">
      <div id="medal" class="text-7xl mx-auto mb-4">🏆</div>
      <h2 id="end-title" class="title-font text-4xl font-bold mb-2">หมดเวลา!</h2>
      <div class="bg-yellow-100 border-4 border-yellow-400 rounded-2xl p-6 my-6">
        <div class="text-gray-600 text-lg mb-1">คะแนนของคุณ</div>
        <div id="final-score" class="text-7xl font-bold text-orange-600">0</div>
      </div>
      <button id="restart-btn" class="btn-cartoon w-full">เล่นอีกครั้ง 🔄</button>
    </div>
  </div>

<script>
// ================== เสียง ==================
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(type) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  if (type === 'correct') {
    playTone(520, 0.08); playTone(780, 0.1, 0.08); playTone(1040, 0.25, 0.18);
  } else if (type === 'wrong') {
    playTone(380, 0.35, 0, 'sawtooth');
  } else if (type === 'pop') {
    const noise = audioCtx.createBufferSource();
    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.18, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
    noise.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.value = 0.45;
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    noise.connect(gain).connect(audioCtx.destination);
    noise.start();
  } else if (type === 'click') {
    playTone(680, 0.06);
  } else if (type === 'levelUp') {
    playTone(660, 0.12); playTone(880, 0.12, 0.1); playTone(1320, 0.3, 0.2);
  }
}
function playTone(freq, duration, delay = 0, type = 'sine') {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + delay + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + delay);
  osc.stop(audioCtx.currentTime + delay + duration);
}

// ================== คำถาม 20 ข้อ ==================
const COUNTING_QUESTIONS = [
  { fruits: "🍎🍎🍎🍎🍎", count: 5 }, { fruits: "🍌🍌🍌🍌", count: 4 },
  { fruits: "🍓🍓🍓🍓🍓", count: 5 }, { fruits: "🍇🍇🍇🍇🍇🍇", count: 6 },
  { fruits: "🥝🥝🥝🥝🥝", count: 5 }, { fruits: "🍊🍊🍊🍊🍊🍊", count: 6 },
  { fruits: "🍉🍉🍉", count: 3 }, { fruits: "🍑🍑🍑🍑🍑🍑", count: 6 },
  { fruits: "🍒🍒🍒🍒", count: 4 }, { fruits: "🫐🫐🫐🫐🫐🫐", count: 6 },
  { fruits: "🍍🍍🍍", count: 3 }, { fruits: "🥭🥭🥭🥭", count: 4 },
  { fruits: "🍓🍓🍓🍓🍓🍓", count: 6 }, { fruits: "🍎🍎🍎🍎", count: 4 },
  { fruits: "🍌🍌🍌🍌🍌", count: 5 }, { fruits: "🍇🍇🍇🍇🍇", count: 5 },
  { fruits: "🍉🍉🍉🍉", count: 4 }, { fruits: "🍊🍊🍊🍊🍊", count: 5 },
  { fruits: "🥝🥝🥝", count: 3 }, { fruits: "🍑🍑🍑🍑🍑", count: 5 }
];

const HAND_CONNECTIONS = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[0,17],[17,18],[18,19],[19,20]];

let state = {
  score: 0, timeLeft: 90, running: false, balloons: [], floatingScores: [], particles: [], currentAnswer: 0,
  handX: 0, handY: 0, handActive: false, isPinching: false, landmarks: null,
  canvasW: 0, canvasH: 0, dpr: 1
};

const canvasGame = document.getElementById('canvas-game');
const ctxGame = canvasGame.getContext('2d');
const canvasHand = document.getElementById('canvas-hand');
const ctxHand = canvasHand.getContext('2d');

let hands = null, camera = null;
let videoEl = document.getElementById('video');

function resize() {
  state.canvasW = window.innerWidth;
  state.canvasH = window.innerHeight;
  state.dpr = window.devicePixelRatio || 1;
  
  [canvasGame, canvasHand].forEach(c => {
    c.width = state.canvasW * state.dpr;
    c.height = state.canvasH * state.dpr;
    c.style.width = state.canvasW + 'px';
    c.style.height = state.canvasH + 'px';
  });
  
  ctxGame.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
  ctxHand.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

const BALLOON_COLORS = [
  { fill: ["#ff9999", "#ff2d2d"], stroke: "#aa0000" }, // แดง
  { fill: ["#ffd699", "#ff8c1a"], stroke: "#cc6600" }, // ส้ม
  { fill: ["#fff599", "#ffd700"], stroke: "#b8b800" }, // เหลือง
  { fill: ["#aaff99", "#33cc33"], stroke: "#1f8b1f" }, // เขียว
  { fill: ["#99e5ff", "#00bfff"], stroke: "#006699" }, // ฟ้า
  { fill: ["#ff99e5", "#ff33a6"], stroke: "#cc0077" }, // ชมพู
  { fill: ["#cc99ff", "#9933ff"], stroke: "#6600cc" }  // ม่วง
];

class Balloon {
  constructor(num, isCorrect, x) {
    this.num = num;
    this.isCorrect = isCorrect;
    this.x = x;
    this.y = state.canvasH + 80;
    this.vy = -1.45 - Math.random() * 0.45;
    this.vx = (Math.random() - 0.5) * 0.55;
    this.wobble = Math.random() * Math.PI * 2;
    this.scale = 0.1;
    this.popped = false;
    this.r = 62;
    this.colors = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
  }
  update() {
    if (this.popped) return;
    this.scale = Math.min(1, this.scale + 0.09);
    this.y += this.vy;
    this.x += this.vx + Math.sin(this.wobble) * 0.75;
    this.wobble += 0.065;
    if (this.y < -160) this.popped = true;
  }
  draw(ctx) {
    if (this.popped) return;
    const r = Math.max(1, this.r * this.scale); 
    const x = this.x, y = this.y;

    ctx.save();
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = "#000000";
    ctx.beginPath();
    ctx.ellipse(x + 4, y + 6, r * 0.95, r * 1.05, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.strokeStyle = '#555'; 
    ctx.lineWidth = 3;
    ctx.beginPath(); 
    ctx.moveTo(x, y + r); 
    ctx.bezierCurveTo(x - 10, y + r + 15, x + 10, y + r + 35, x, y + r + 52); 
    ctx.stroke();

    const grad = ctx.createRadialGradient(x - r * 0.4, y - r * 0.45, r * 0.1, x, y + r * 0.2, r * 1.2);
    grad.addColorStop(0, this.colors.fill[0]); 
    grad.addColorStop(1, this.colors.fill[1]); 
    ctx.fillStyle = grad;
    ctx.beginPath(); 
    ctx.ellipse(x, y, r * 0.93, r, 0, 0, Math.PI * 2); 
    ctx.fill();

    ctx.strokeStyle = this.colors.stroke; 
    ctx.lineWidth = 5; 
    ctx.stroke();

    ctx.fillStyle = this.colors.stroke;
    ctx.beginPath();
    ctx.moveTo(x - 6, y + r - 2);
    ctx.lineTo(x + 6, y + r - 2);
    ctx.lineTo(x, y + r + 10);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath(); 
    ctx.ellipse(x - r*0.38, y - r*0.4, r*0.28, r*0.2, -0.5, 0, Math.PI * 2); 
    ctx.fill();
    
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); 
    ctx.ellipse(x + r*0.3, y + r*0.3, r*0.15, r*0.1, -0.5, 0, Math.PI * 2); 
    ctx.fill();

    ctx.font = `bold ${r * 0.9}px Fredoka`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 6;
    ctx.strokeText(this.num, x, y + 4);
    ctx.fillStyle = 'white';
    ctx.fillText(this.num, x, y + 4);
  }
  hitTest(px, py) {
    if (this.popped) return false;
    const dx = px - this.x;
    const dy = py - this.y;
    return (dx * dx + dy * dy) < (this.r * this.scale * 1.2) ** 2;
  }
}

function isOverlapping(x) {
  return state.balloons.some(b => !b.popped && Math.abs(b.x - x) < 110);
}

function spawnBalloon(num, isCorrect) {
  if (state.balloons.length >= 6) return;
  let x, attempts = 0;
  do {
    x = 90 + Math.random() * (state.canvasW - 180);
    attempts++;
  } while (isOverlapping(x) && attempts < 20);

  state.balloons.push(new Balloon(num, isCorrect, x));
}

function newQuestion() {
  const q = COUNTING_QUESTIONS[Math.floor(Math.random() * COUNTING_QUESTIONS.length)];
  state.currentAnswer = q.count;
  
  // อัปเดตโจทย์ผลไม้แบบไม่มีกรอบและขยายใหญ่
  document.getElementById('prompt-text').innerHTML = `<span class="fruit-display">${q.fruits}</span>`;
  state.balloons = [];
  
  spawnBalloon(state.currentAnswer, true);
  
  const numWrong = 3;
  const wrongNumbers = new Set();
  while(wrongNumbers.size < numWrong) {
    let n = Math.floor(Math.random() * 9) + 1;
    if (n !== state.currentAnswer) wrongNumbers.add(n);
  }
  
  wrongNumbers.forEach(n => spawnBalloon(n, false));
}

function createParticles(x, y, correct) {
  const colors = correct 
    ? ['#fde047', '#fef08c', '#facc15', '#22d3ee', '#67e8f9', '#a5f3fc', '#f472b6', '#f9a8d4', '#ffffff'] 
    : ['#f87171', '#fb7185', '#fda4af', '#ef4444'];
      
  for (let i = 0; i < 100; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 8.5;
    state.particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 4.5,
      size: 4 + Math.random() * 9, color: colors[Math.floor(Math.random() * colors.length)],
      life: 1.4, decay: 0.012 + Math.random() * 0.01,
      isStar: correct && Math.random() > 0.6, rotation: Math.random() * Math.PI, rotSpeed: (Math.random() - 0.5) * 0.2
    });
  }
  
  if (correct) {
    state.particles.push({ x: x, y: y, isRing: true, radius: 10, maxRadius: 150, life: 1.0, decay: 0.05, color: '#fde047' });
    state.particles.push({ x: x, y: y, isRing: true, radius: 10, maxRadius: 180, life: 1.0, decay: 0.04, color: '#22d3ee' });
  }
}

function updateParticles() {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    if (p.isRing) {
      p.radius += (p.maxRadius - p.radius) * 0.15;
      p.life -= p.decay;
    } else {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.25; p.vx *= 0.98;
      p.life -= p.decay;
      if (p.isStar) p.rotation += p.rotSpeed;
    }
    if (p.life <= 0) state.particles.splice(i, 1);
  }
}

function drawParticles(ctx) {
  for (let p of state.particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    
    if (p.isRing) {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 8 * p.life;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.stroke();
    } else {
      ctx.translate(p.x, p.y);
      if (p.isStar) {
        ctx.rotate(p.rotation);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
          ctx.lineTo(Math.cos(a) * p.size, Math.sin(a) * p.size);
          ctx.lineTo(Math.cos(a + Math.PI/5) * p.size * 0.4, Math.sin(a + Math.PI/5) * p.size * 0.4);
        }
        ctx.closePath(); ctx.fill();
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(0, 0, p.size, 0, Math.PI * 2); ctx.fill();
      }
    }
    ctx.restore();
  }
}

function createFloatingScore(x, y, text, color) {
  state.floatingScores.push({ x: x, y: y - 40, text: text, color: color, life: 1.4, scale: 0.6 });
}

function updateFloatingScores() {
  for (let i = state.floatingScores.length - 1; i >= 0; i--) {
    const f = state.floatingScores[i];
    f.y -= 2.3; f.life -= 0.028; f.scale = Math.min(1.15, f.scale + 0.13);
    if (f.life <= 0) state.floatingScores.splice(i, 1);
  }
}

function drawFloatingScores(ctx) {
  ctx.save();
  for (let f of state.floatingScores) {
    ctx.globalAlpha = f.life * 0.95;
    ctx.translate(f.x, f.y);
    ctx.scale(f.scale, f.scale);
    ctx.font = `bold 46px Fredoka`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'white'; ctx.lineWidth = 8;
    ctx.strokeText(f.text, 0, 0);
    ctx.fillStyle = f.color; ctx.fillText(f.text, 0, 0);
  }
  ctx.restore();
}

function initHands() {
  hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}` });
  hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.82, minTrackingConfidence: 0.78 });
  hands.onResults(onResults);
}

function onResults(results) {
  if (!state.running) return;
  const status = document.getElementById('status');
  if (results.multiHandLandmarks?.length > 0) {
    const lm = results.multiHandLandmarks[0];
    state.landmarks = lm; // เก็บตำแหน่งจุดเพื่อวาดโครงกระดูกมือ
    
    // เคอร์เซอร์ที่ปลายนิ้วชี้ (Landmark 8) โดยแปลงพิกัดแกน X ให้ตรงกับวิดีโอที่ถูกสลับกระจก (Mirrored)
    state.handX = (1 - lm[8].x) * state.canvasW; 
    state.handY = lm[8].y * state.canvasH;
    state.handActive = true;
    
    // เช็คระยะห่างระหว่างปลายนิ้วโป้ง (4) กับปลายนิ้วชี้ (8) เพื่อคำนวณการหยิบ (Pinch)
    const dist = Math.hypot(lm[8].x - lm[4].x, lm[8].y - lm[4].y);
    const wasPinching = state.isPinching;
    state.isPinching = dist < 0.055;
    
    status.textContent = state.isPinching ? "🤏 หยิบลูกโป่ง!" : "👆 ชี้และจีบนิ้วเพื่อหยิบ";
    status.style.background = "rgba(16,185,129,0.9)";
    
    // ตรวจจับ Action การคลิกเมื่อเริ่มจีบนิ้ว
    if (state.isPinching && !wasPinching) {
      handlePinchClick();
    }
  } else {
    state.landmarks = null;
    state.handActive = false; state.isPinching = false;
    status.textContent = "✋ ยื่นมือเข้าหากล้อง";
    status.style.background = "rgba(239,68,68,0.9)";
  }
}

function handlePinchClick() {
  for (let i = state.balloons.length - 1; i >= 0; i--) {
    if (state.balloons[i].hitTest(state.handX, state.handY)) {
      const b = state.balloons[i];
      playSound('pop');
      createParticles(b.x, b.y, b.isCorrect);
      
      if (b.isCorrect) {
        playSound('correct');
        state.score += 10;
        state.timeLeft = Math.min(90, state.timeLeft + 1);
        document.getElementById('score-val').textContent = state.score;
        document.getElementById('time-val').textContent = state.timeLeft;
        createFloatingScore(b.x, b.y - 45, '+10 ✨', '#22c55e');
        newQuestion();
      } else {
        playSound('wrong');
        state.score = Math.max(0, state.score - 5);
        document.getElementById('score-val').textContent = state.score;
        createFloatingScore(b.x, b.y - 45, '-5', '#ef4444');
      }
      b.popped = true;
      break; // หยิบทีละลูก
    }
  }
}

// ฟังก์ชันวาดโครงกระดูกมือบนหน้าจอ
function drawHandSkeleton(ctx, landmarks) {
  ctx.save();
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
  ctx.lineWidth = 4;
  
  // วาดเส้นเชื่อมต่อ (Bones)
  for (let conn of HAND_CONNECTIONS) {
    const p1 = landmarks[conn[0]];
    const p2 = landmarks[conn[1]];
    ctx.beginPath();
    ctx.moveTo((1 - p1.x) * state.canvasW, p1.y * state.canvasH);
    ctx.lineTo((1 - p2.x) * state.canvasW, p2.y * state.canvasH);
    ctx.stroke();
  }
  
  // วาดข้อต่อ (Joints)
  for (let i = 0; i < landmarks.length; i++) {
    const lm = landmarks[i];
    // ไฮไลท์นิ้วโป้ง(4) และนิ้วชี้(8) ให้เด่นชัดเพื่อบ่งบอกจุดหยิบ
    ctx.fillStyle = (i === 4 || i === 8) ? '#facc15' : 'rgba(255, 255, 255, 0.8)';
    ctx.beginPath();
    ctx.arc((1 - lm.x) * state.canvasW, lm.y * state.canvasH, (i === 4 || i === 8) ? 8 : 5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function gameLoop(timestamp) {
  if (!state.running) return;
  ctxGame.clearRect(0, 0, state.canvasW, state.canvasH);
  ctxHand.clearRect(0, 0, state.canvasW, state.canvasH);

  for (let i = state.balloons.length - 1; i >= 0; i--) {
    const b = state.balloons[i];
    b.update();
    b.draw(ctxGame);
    if (b.popped) state.balloons.splice(i, 1);
  }

  // ตรวจสอบว่ามีลูกโป่งคำตอบที่ถูกต้องและตัวหลอกอยู่บนจอหรือไม่
  let hasCorrect = false;
  let wrongCount = 0;
  const currentWrongNums = new Set();
  
  for (let b of state.balloons) {
    if (b.isCorrect) hasCorrect = true;
    else {
      wrongCount++;
      currentWrongNums.add(b.num);
    }
  }
  
  // กรณีตอบไม่ทัน (ลูกโป่งที่ถูกลอยหายไป) ให้สร้างคำตอบที่ถูกขึ้นมาใหม่เรื่อยๆ
  if (!hasCorrect && state.balloons.length < 6 && state.currentAnswer > 0) {
    spawnBalloon(state.currentAnswer, true);
  }
  
  // เติมลูกโป่งตัวหลอกให้ครบ 3 ลูกเสมอ เพื่อไม่ให้จอโล่งเกินไป
  let spawnAttempts = 0;
  while (wrongCount < 3 && state.balloons.length < 6 && spawnAttempts < 10) {
    let n = Math.floor(Math.random() * 9) + 1;
    if (n !== state.currentAnswer && !currentWrongNums.has(n)) {
      spawnBalloon(n, false);
      currentWrongNums.add(n);
      wrongCount++;
    }
    spawnAttempts++;
  }

  updateParticles();
  drawParticles(ctxGame);
  updateFloatingScores();
  drawFloatingScores(ctxGame);

  if (state.handActive && state.landmarks) {
    drawHandSkeleton(ctxHand, state.landmarks);
    
    ctxHand.strokeStyle = state.isPinching ? '#22c55e' : '#eab308';
    ctxHand.lineWidth = 6;
    ctxHand.beginPath(); ctxHand.arc(state.handX, state.handY, 34, 0, Math.PI * 2); ctxHand.stroke();
    if (state.isPinching) {
      ctxHand.fillStyle = '#22c55e';
      ctxHand.beginPath(); ctxHand.arc(state.handX, state.handY, 16, 0, Math.PI * 2); ctxHand.fill();
    }
  }

  requestAnimationFrame(gameLoop);
}

function startTimer() {
  let timerInterval = setInterval(() => {
    if (!state.running) {
      clearInterval(timerInterval);
      return;
    }
    state.timeLeft--;
    document.getElementById('time-val').textContent = state.timeLeft;
    document.getElementById('progress').style.width = (state.timeLeft / 90 * 100) + '%';
    if (state.timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

async function startCamera() {
  const status = document.getElementById('status');
  status.textContent = "📷 กำลังขอสิทธิ์กล้องและประมวลผล AI...";
  try {
    initHands();
    camera = new Camera(videoEl, {
      onFrame: async () => { if (state.running && hands) await hands.send({ image: videoEl }); },
      width: 640, height: 480
    });
    await camera.start();
    status.textContent = "👆 ชี้และจีบนิ้วเพื่อหยิบ";
    return true;
  } catch (e) {
    status.innerHTML = "❌ ต้องเปิดกล้อง<br>กรุณาอนุญาตแล้วรีเฟรช";
    return false;
  }
}

function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  state.score = 0; state.timeLeft = 90; state.balloons = []; state.floatingScores = []; state.particles = [];
  document.getElementById('score-val').textContent = '0';
  document.getElementById('time-val').textContent = '90';
  document.getElementById('progress').style.width = '100%';
  state.running = true;
  newQuestion();
  initAudio();
  playSound('click');
  startCamera().then(success => {
    if (success) {
      requestAnimationFrame(gameLoop);
      startTimer();
    }
  });
}

function endGame() {
  state.running = false;
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('end-screen').classList.remove('hidden');
  document.getElementById('final-score').textContent = state.score;
  playSound('levelUp');
  
  if (camera) {
    camera.stop();
  }
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', () => location.reload());
</script>
